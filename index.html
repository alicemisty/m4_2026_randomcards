<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 AI Tarot Oracle: 3D Galaxy (Click & Hand)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Noto Serif JP', serif;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        /* Japanese Mystic UI */
        .ui-header {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, #fff, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #d8b4fe;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        .webcam-preview {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            overflow: hidden;
            z-index: 10;
            transform: scaleX(-1);
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-header">
        <h1>🔮 今日の一枚 🔮</h1>
        <div class="subtitle">3D GALAXY TAROT ORACLE</div>
        <div id="status-text" style="color: #a78bfa; margin-top: 15px;">🖐 ชูนิ้วชี้ หรือ คลิกที่ไพ่เพื่อทำนายดวง 🪐</div>
    </div>

    <div class="webcam-preview">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <script>
        const totalCards = 72; 
        const uniqueStudents = 25; 
        let cards = [];
        let scene, camera, renderer, starPoints, raycaster;
        let hand2D = new THREE.Vector2(-999, -999);
        let mouse2D = new THREE.Vector2(-999, -999);
        let activeCard = null;
        let isUsingMouse = false; // ตัวแปรเช็กว่ากำลังใช้เมาส์คลิกอยู่ไหม

        function init3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.05);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x442266, 2));
            const pointLight = new THREE.PointLight(0xffd700, 2, 20);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            createTwinklingStars();
            createTarotOrbit();

            raycaster = new THREE.Raycaster();

            // ---- เพิ่ม Event การตรวจจับ เมาส์ และ การทัชหน้าจอ ----
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            
            // รองรับจอสัมผัส (iPad/Tablet/สมาร์ทโฟน)
            window.addEventListener('touchstart', onTouchStart, {passive: false});
            window.addEventListener('touchend', onTouchEnd);
        }

        function createTwinklingStars() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 3000;
            const pos = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);

            for (let i = 0; i < starCount * 3; i += 3) {
                pos[i] = (Math.random() - 0.5) * 50;
                pos[i+1] = (Math.random() - 0.5) * 50;
                pos[i+2] = (Math.random() - 0.5) * 50;
                sizes[i/3] = Math.random();
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            starGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            starPoints = new THREE.Points(starGeo, starMat);
            scene.add(starPoints);
        }

        function createTarotOrbit() {
            const textureLoader = new THREE.TextureLoader();
            
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 384;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1a0033'; ctx.fillRect(0, 0, 256, 384);
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 10; ctx.strokeRect(10, 10, 236, 364);
            ctx.fillStyle = '#ffd700'; ctx.font = '50px serif'; ctx.fillText('✨', 105, 195);
            const backTex = new THREE.CanvasTexture(canvas);

            for (let i = 0; i < totalCards; i++) {
                const studentId = (i % uniqueStudents) + 1;
                const cardGeo = new THREE.BoxGeometry(0.7, 1.1, 0.02);
                
                const frontTex = textureLoader.load(`image/${studentId}.png`, undefined, undefined, () => {
                    frontTex.image.src = `images/${studentId}.png`;
                });
                
                const frontMat = new THREE.MeshStandardMaterial({ map: frontTex });
                const backMat = new THREE.MeshStandardMaterial({ map: backTex });

                const materials = [backMat, backMat, backMat, backMat, backMat, frontMat];
                const card = new THREE.Mesh(cardGeo, materials);

                card.userData = {
                    angle: (i / totalCards) * Math.PI * 2,
                    speed: 0.002 + (Math.random() * 0.001),
                    radiusX: 5.5,
                    radiusY: 3.5,
                    radiusZ: 2.0,
                    studentId: studentId
                };

                cards.push(card);
                scene.add(card);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            starPoints.material.opacity = 0.5 + Math.sin(time * 3) * 0.3;
            starPoints.rotation.y += 0.0005;

            // การเคลื่อนที่ของไพ่ในวงโคจร 3D
            cards.forEach(card => {
                if (card !== activeCard) {
                    card.userData.angle += card.userData.speed;
                    const ang = card.userData.angle;
                    
                    card.position.x = Math.cos(ang) * card.userData.radiusX;
                    card.position.y = Math.sin(ang) * card.userData.radiusY;
                    card.position.z = Math.sin(ang * 0.5) * card.userData.radiusZ;

                    card.rotation.x = Math.sin(ang) * 0.5;
                    card.rotation.y = ang + Math.PI / 2;
                    card.rotation.z = 0;
                }
            });

            // เลือกระบบคำนวณ Raycaster (ถ้าใช้เมาส์คลิกอยู่ให้ใช้พิกัดเมาส์ ถ้าไม่ใช้ให้ใช้พิกัดมือ AI)
            let currentCoords = isUsingMouse ? mouse2D : hand2D;
            raycaster.setFromCamera(currentCoords, camera);
            
            const intersects = raycaster.intersectObjects(cards);

            if (intersects.length > 0) {
                const selected = intersects[0].object;
                if (activeCard !== selected) {
                    if (activeCard) resetCard(activeCard);
                    activeCard = selected;
                    pickCard(activeCard);
                }
            } else {
                // ถ้าใช้เมาส์ จะคืนค่าไพ่ต่อเมื่อปล่อยคลิก (MouseUp) 
                // แต่ถ้าใช้กล้องมือจับ ถ้าวนนิ้วหนีไปทางอื่นให้คืนค่าทันที
                if (activeCard && !isUsingMouse) {
                    resetCard(activeCard);
                    activeCard = null;
                }
            }

            renderer.render(scene, camera);
        }

        function pickCard(card) {
            document.getElementById('status-text').innerText = `🔮 生徒番号 ${card.userData.studentId} 番を選択中 (นักเรียนคนที่ ${card.userData.studentId}) 🔮`;
            document.getElementById('status-text').style.color = "#ffd700";
            
            gsap.to(card.position, { x: 0, y: 0, z: 5, duration: 0.6, ease: "back.out(1.5)" });
            gsap.to(card.rotation, { x: 0, y: Math.PI, z: 0, duration: 0.6 });
        }

        function resetCard(card) {
            document.getElementById('status-text').innerText = "🖐 ชูนิ้วชี้ หรือ คลิกที่ไพ่เพื่อทำนายดวง 🪐";
            document.getElementById('status-text').style.color = "#a78bfa";
        }

        // ---- ฟังก์ชันการจัดการเมาส์และการทัช ----
        function onMouseMove(event) {
            // อัปเดตตำแหน่งเมาส์เอาไว้เผื่อใช้เช็กตอนกดคลิก
            if(isUsingMouse) {
                mouse2D.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse2D.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }
        }

        function onMouseDown(event) {
            isUsingMouse = true;
            mouse2D.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse2D.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onMouseUp() {
            if (isUsingMouse) {
                if (activeCard) {
                    resetCard(activeCard);
                    activeCard = null;
                }
                isUsingMouse = false;
                mouse2D.set(-999, -999);
            }
        }

        function onTouchStart(event) {
            isUsingMouse = true;
            const touch = event.touches[0];
            mouse2D.x = (touch.clientX / window.innerWidth) * 2 - 1;
            mouse2D.y = -(touch.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchEnd() {
            if (isUsingMouse) {
                if (activeCard) {
                    resetCard(activeCard);
                    activeCard = null;
                }
                isUsingMouse = false;
                mouse2D.set(-999, -999);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- กล้องจับมือ MediaPipe ---
        const videoElement = document.getElementById('webcam');
        function onResults(results) {
            // ถ้าใช้เมาส์คลิกอยู่ ให้ปิดระบบตรวจจับมือชั่วคราวเพื่อไม่ให้พิกัดตีกัน
            if (isUsingMouse) return; 

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const tip = results.multiHandLandmarks[0][8]; 
                hand2D.x = -(tip.x * 2 - 1);
                hand2D.y = -(tip.y * 2 - 1) + 0.2; 
            } else {
                hand2D.set(-999, -999);
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.55, minTrackingConfidence: 0.55 });
        hands.onResults(onResults);

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                videoElement.srcObject = stream;
                async function predict() {
                    await hands.send({image: videoElement});
                    requestAnimationFrame(predict);
                }
                predict();
            } catch(e) {
                console.log("Webcam not available or blocked, running in Click-Only mode.");
                document.getElementById('status-text').innerText = "🖱️ โหมดคลิกเลือกไพ่ทำงาน (ไม่ได้เปิดใช้กล้อง) 🪐";
            }
        }

        init3D();
        animate();
        setupCamera();
    </script>
</body>
</html>
