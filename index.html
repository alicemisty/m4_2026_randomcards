<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 今日の一枚 - AI Tarot Oracle</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@700&family=Prompt:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0033 0%, #030010 100%);
            font-family: 'Noto Serif JP', 'Prompt', sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* จัดตำแหน่ง UI ข้อความให้อยู่ด้านบน สวยงาม เป็นระเบียบ */
        .ui-header {
            position: absolute;
            top: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* ยอมให้เมาส์คลิกทะลุไปโดนไพ่ด้านหลังได้ */
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(to bottom, #ffffff 0%, #ffd700 60%, #ff9900 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(157, 23, 248, 0.5);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #d8b4fe;
            margin-top: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .status {
            color: #ffd700;
            font-size: 1.1rem;
            margin-top: 15px;
            background: rgba(15, 5, 30, 0.7);
            padding: 8px 25px;
            display: inline-block;
            border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(8px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-header">
        <h1>🔮 今日の一枚 • AI タロット 🔮</h1>
        <div class="subtitle">คลิกเลือกไพ่ทาโรต์เพื่อเปิดดวงชะตานักเรียน</div>
        <div class="status" id="status-text">✨ 運命のカードを1枚クリックしてください (คลิกเลือกไพ่แห่งโชคชะตา 1 ใบ) ✨</div>
    </div>

    <script>
        const totalCards = 45; // จำนวนไพ่ที่เรียงในวง เพื่อให้ดูหนาแน่นสวยงามพอดีๆ
        const uniqueStudents = 25; // รูป 1.png ถึง 25.png
        let cards = [];
        let scene, camera, renderer, starPoints, raycaster;
        let mouse = new THREE.Vector2();
        let activeRevealedCard = null; // เช็กว่ามีไพ่ใบไหนเปิดป็อบอัพอยู่ไหม

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a001a, 0.03);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            // ปรับตำแหน่งกล้องให้อยู่ในมุมมองที่เห็นไพ่อยู่ครึ่งล่างของจออย่างสมดุล
            camera.position.set(0, 0.5, 8.5); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // เพิ่มแสงสว่างรอบทิศทางให้หน้าไพ่สว่างสดใส รูปไม่มืดดำ
            scene.add(new THREE.AmbientLight(0xffffff, 1.5)); 
            const directionalLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
            directionalLight.position.set(0, 5, 5);
            scene.add(directionalLight);

            createUniverseBackground();
            createBeautifulTarotFan();

            raycaster = new THREE.Raycaster();

            // ลงทะเบียนเหตุการณ์คลิกเมาส์/แตะหน้าจอ
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('click', onCardClick);
        }

        // 1. สร้างพื้นหลังจักรวาลดวงดาวระยิบระยับ
        function createUniverseBackground() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 2000;
            const pos = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                pos[i] = (Math.random() - 0.5) * 50;
                pos[i+1] = (Math.random() - 0.5) * 50;
                pos[i+2] = (Math.random() - 0.5) * 50;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const starMat = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.08,
                transparent: true,
                opacity: 0.8
            });

            starPoints = new THREE.Points(starGeo, starMat);
            scene.add(starPoints);
        }

        // 2. เรียงไพ่เป็นรูปวงรีสวยงาม นิ่งสงบอยู่ด้านล่างข้อความ
        function createBeautifulTarotFan() {
            const textureLoader = new THREE.TextureLoader();
            
            // วาดลวดลายหลังไพ่สีม่วงขอบทองหรูหราอัจฉริยะ (รูปไม่ดำแน่นอนเพราะสร้างจากระบบ)
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 384;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#22003c'; ctx.fillRect(0, 0, 256, 384);
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 10; ctx.strokeRect(12, 12, 232, 360);
            ctx.strokeStyle = '#9333ea'; ctx.lineWidth = 3; ctx.strokeRect(22, 22, 212, 340);
            ctx.fillStyle = '#ffd700'; ctx.font = '45px serif'; ctx.fillText('✨', 106, 190);
            const backTex = new THREE.CanvasTexture(canvas);

            // พิกัดวงรีสำหรับปาดไพ่ไว้ครึ่งล่างของจอ
            const radiusX = 4.8;
            const radiusY = 2.8;

            for (let i = 0; i < totalCards; i++) {
                const studentId = (i % uniqueStudents) + 1;
                const cardGeo = new THREE.BoxGeometry(0.72, 1.15, 0.02);
                
                // โหลดรูปภาพนักเรียนจากโฟลเดอร์ image/ ของคุณครู
                const frontTex = textureLoader.load(`image/${studentId}.png`, 
                    (texture) => {
                        // เมื่อโหลดสำเร็จ ตั้งค่าให้ภาพคมชัด ไม่เบลอ
                        texture.minFilter = THREE.LinearFilter;
                    }, 
                    undefined, 
                    () => {
                        // แผนสำรองเผื่อคุณครูใช้โฟลเดอร์ชื่อ images (มี s)
                        frontTex.image.src = `images/${studentId}.png`;
                    }
                );
                
                // กำหนด Material ทั้งฝั่งหน้าและหลังให้สะท้อนแสงสวยงาม
                const frontMat = new THREE.MeshStandardMaterial({ map: frontTex, side: THREE.DoubleSide });
                const backMat = new THREE.MeshStandardMaterial({ map: backTex, side: THREE.DoubleSide });
                
                // อัปเดตเพื่อให้แสดงผลฝั่งตรงข้ามกันอย่างถูกต้อง (แก้ปัญหารูปดำ)
                const materials = [backMat, backMat, backMat, backMat, backMat, frontMat];
                const card = new THREE.Mesh(cardGeo, materials);

                // คำนวณองศาให้แผ่เรียงเป็นครึ่งวงรีด้านล่างอย่างสวยงาม
                const angleOffset = Math.PI * 0.12; 
                const ang = angleOffset + (i / (totalCards - 1)) * (Math.PI * 2 - angleOffset * 2);
                
                const targetX = Math.cos(ang) * radiusX;
                const targetY = Math.sin(ang) * radiusY - 1.2; // ดึงตำแหน่งลงมาด้านล่างเพื่อหลบข้อความหัวเว็บ
                const targetZ = -Math.abs(Math.cos(ang)) * 0.5;

                card.position.set(targetX, targetY, targetZ);
                
                // ตั้งค่ามุมเอียงของไพ่แต่ละใบให้หันหน้าเข้าสู่จุดศูนย์กลางอย่างเป็นระเบียบ
                card.rotation.set(0.2, 0, ang - Math.PI / 2);

                // เก็บค่าตำแหน่งดั้งเดิมไว้เพื่อใช้ตอนส่งไพ่กลับเข้าวง
                card.userData = {
                    studentId: studentId,
                    origX: targetX,
                    origY: targetY,
                    origZ: targetZ,
                    origRx: card.rotation.x,
                    origRy: card.rotation.y,
                    origRz: card.rotation.z,
                    isRevealed: false
                };

                cards.push(card);
                scene.add(card);
            }
        }

        // 3. ระบบคลิกป็อบอัพและส่งกลับ
        function onCardClick(event) {
            // แปลงพิกัดเมาส์ให้เป็นพิกัดระบบ 3D
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // ถ้าตอนนี้มีไพ่เปิดป็อบอัพค้างอยู่กลางจอ แล้วเราคลิกที่ไพ่ใบนั้นซ้ำ มันจะบินกลับเข้าวงทันที
            if (activeRevealedCard) {
                const intersects = raycaster.intersectObject(activeRevealedCard);
                if (intersects.length > 0) {
                    sendCardBack(activeRevealedCard);
                    return;
                }
            }

            // ตรวจจับการคลิกเลือกไพ่ใบใหม่
            const intersects = raycaster.intersectObjects(cards);
            if (intersects.length > 0) {
                const clickedCard = intersects[0].object;

                if (!clickedCard.userData.isRevealed) {
                    // ถ้ามีไพ่ใบอื่นเปิดอยู่ก่อนหน้า ให้ส่งใบเก่ากลับไปก่อน
                    if (activeRevealedCard) {
                        sendCardBack(activeRevealedCard);
                    }

                    // เปิดไพ่ใบใหม่ขึ้นมา
                    activeRevealedCard = clickedCard;
                    revealCardPopUp(clickedCard);
                }
            }
        }

        // ฟังก์ชันสั่งให้ไพ่พุ่งขึ้นมาเป็นป็อบอัพหงายหน้าตรงกลางจอ
        function revealCardPopUp(card) {
            card.userData.isRevealed = true;
            document.getElementById('status-text').innerText = `🔮 運命の生徒：${card.userData.studentId} 番 (นักเรียนผู้โชคดีคือเลขที่ ${card.userData.studentId}) 🔮`;
            document.getElementById('status-text').style.color = "#ffd700";

            // บินมาตรงกลางหน้าจอ ยกระดับความสูงขึ้นเล็กน้อย ขยับเข้าใกล้กล้อง และหมุนพลิกหงาย 180 องศาเพื่อโชว์รูปนักเรียนชัดๆ
            gsap.to(card.position, { x: 0, y: 0.6, z: 4.6, duration: 0.6, ease: "back.out(1.2)" });
            gsap.to(card.rotation, { x: 0, y: Math.PI, z: 0, duration: 0.6, ease: "power2.out" });
        }

        // ฟังก์ชันส่งไพ่กลับไปคว่ำหน้าเรียงนิ่งๆ อยู่ที่เดิมด้านล่าง
        function sendCardBack(card) {
            card.userData.isRevealed = false;
            if (activeRevealedCard === card) activeRevealedCard = null;

            document.getElementById('status-text').innerText = "✨ 運命のカードを1枚クリックしてください (คลิกเลือกไพ่แห่งโชคชะตา 1 ใบ) ✨";
            document.getElementById('status-text').style.color = "#ffd700";

            gsap.to(card.position, { x: card.userData.origX, y: card.userData.origY, z: card.userData.origZ, duration: 0.5, ease: "power2.inOut" });
            gsap.to(card.rotation, { x: card.userData.origRx, y: card.userData.origRy, z: card.userData.origRz, duration: 0.5, ease: "power2.inOut" });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // ทำให้พื้นหลังดวงดาวหมุนเอื่อยๆ เพิ่มความลึกลับมีมิติ
            if (starPoints) {
                starPoints.rotation.y += 0.0003;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // เริ่มต้นการทำงานระบบ
        init3D();
        animate();
    </script>
</body>
</html>
