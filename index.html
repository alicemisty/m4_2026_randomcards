<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 今日の一枚 - AI Tarot Oracle</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Serif+JP:wght@500;700&family=Prompt:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #15002b 0%, #030010 100%);
            font-family: 'Noto Serif JP', 'Cinzel', 'Prompt', sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Japanese Fortune Teller UI Design */
        .ui-header {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #fff7d6 0%, #ffd700 50%, #cca100 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.6);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #e9d5ff;
            margin-top: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
        }

        .status {
            color: #a78bfa;
            font-size: 1rem;
            margin-top: 12px;
            background: rgba(15, 5, 30, 0.6);
            padding: 6px 20px;
            display: inline-block;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            backdrop-filter: blur(5px);
        }

        /* Webcam Frame - Bottom Right Corner */
        .webcam-preview {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 150px;
            height: 112px;
            border: 2px solid rgba(168, 85, 247, 0.5);
            border-radius: 12px;
            overflow: hidden;
            z-index: 10;
            transform: scaleX(-1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-header">
        <h1>🔮 今日の一枚 • AI タロット 🔮</h1>
        <div class="subtitle">ส่องพลังนิ้วลิขิตดวงทาโรต์นักเรียน</div>
        <div class="status" id="status-text">🪐 占いの館へようこそ (กำลังเชื่อมต่อดวงดาว...) 🪐</div>
    </div>

    <div class="webcam-preview">
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <script>
        // ----------------- ข้อมูลนักเรียนและการประมวลผลวนซ้ำ -----------------
        const uniqueStudentsCount = 25; // รูปจริงของคุณครู 25 รูป
        const totalCardsInCircle = 72;   // สร้างจำนวนการ์ดให้เยอะและหนาแน่นเป็นวงสวยงามแบบไพ่จริง
        const students = [];

        for (let i = 0; i < totalCardsInCircle; i++) {
            // ใช้คณิตศาสตร์หารเอาเศษ (Modulo) วนลำดับรูป 1.png ถึง 25.png ไปเรื่อยๆ จนเต็มวง
            const studentId = (i % uniqueStudentsCount) + 1;
            students.push({
                id: studentId,
                imgFront: `image/${studentId}.png` 
            });
        }
        // ------------------------------------------------------------------

        let scene, camera, renderer, cardsGroup, starField;
        let pointerSphere;
        let raycaster = new THREE.Raycaster();
        let hand2D = new THREE.Vector2(-999, -999);
        let activeCard = null;

        function init3D() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050012, 0.02);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, -1.5, 9); // ปรับมุมกล้องให้กดเสยขึ้นเล็กน้อย เพิ่มความโอ่อ่า

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // แสงสว่างโทนเวทมนตร์ลึกลับ
            scene.add(new THREE.AmbientLight(0x4c1d95, 3.0)); 
            const topLight = new THREE.DirectionalLight(0xffedd5, 2.0);
            topLight.position.set(0, 10, 8);
            scene.add(topLight);

            createGalaxyBackground();

            cardsGroup = new THREE.Group();
            scene.add(cardsGroup);

            createLuxuryTarotFan();

            // จุดแสงเวทมนตร์สีอควาติดตามปลายนิ้ว
            const pointerGeo = new THREE.SphereGeometry(0.1, 32, 32);
            const pointerMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.8 });
            pointerSphere = new THREE.Mesh(pointerGeo, pointerMat);
            scene.add(pointerSphere);

            window.addEventListener('resize', onWindowResize);
        }

        function createGalaxyBackground() {
            const starCount = 2000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);

            for (let i = 0; i < starCount * 3; i += 3) {
                const radius = 15 + Math.random() * 25;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                positions[i] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i+1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i+2] = radius * Math.cos(phi);

                const rand = Math.random();
                if (rand > 0.7) {
                    colors[i] = 0.8; colors[i+1] = 0.6; colors[i+2] = 1.0; 
                } else if (rand > 0.4) {
                    colors[i] = 0.3; colors[i+1] = 0.9; colors[i+2] = 1.0; 
                } else {
                    colors[i] = 1.0; colors[i+1] = 0.9; colors[i+2] = 0.6; 
                }
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.12,
                vertexColors: true,
                transparent: true,
                opacity: 0.7
            });

            starField = new THREE.Points(geometry, material);
            scene.add(starField);
        }

        // ดีไซน์หลังไพ่เวทมนตร์ออโต้สไตล์ญี่ปุ่น และเรียงการ์ดถี่ซ้อนทับกันแบบพัดวงรีที่สวยงาม
        function createLuxuryTarotFan() {
            const radiusX = 4.8; // ขยายความกว้างวงรีซ้ายขวา
            const radiusY = 3.2; // ขยายความลึกวงรีบนล่าง
            const cardW = 0.7;   
            const cardH = 1.15;
            
            const textureLoader = new THREE.TextureLoader();

            // วาดพื้นผิวหลังไพ่สีม่วงเข้มขอบทองจักรราศีลึกลับ (ไม่ต้องใช้ไฟล์รูปภาพ)
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 384;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1e0038'; ctx.fillRect(0, 0, 256, 384);
            ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 8; ctx.strokeRect(12, 12, 232, 360);
            ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, 216, 344);
            ctx.fillStyle = '#ffd700'; ctx.font = '48px serif'; ctx.fillText('✨', 104, 180);
            ctx.strokeStyle = 'rgba(255,215,0,0.3)'; ctx.arc(128, 165, 50, 0, Math.PI*2); ctx.stroke();
            const backTexture = new THREE.CanvasTexture(canvas);

            students.forEach((student, index) => {
                const cardPivot = new THREE.Group();
                const angle = (index / totalCardsInCircle) * Math.PI * 2;

                const cardGeo = new THREE.BoxGeometry(cardW, cardH, 0.015);
                const backMat = new THREE.MeshStandardMaterial({ map: backTexture, roughness: 0.3, metalness: 0.4 });
                
                const frontTex = textureLoader.load(student.imgFront, undefined, undefined, () => {
                    // แผนสำรองกรณีหาไฟล์โฟลเดอร์สลับไปมา
                    frontTex.image.src = `images/${student.id}.png`;
                });
                const frontMat = new THREE.MeshStandardMaterial({ map: frontTex, roughness: 0.15 });

                const materials = [
                    backMat, backMat, backMat, backMat, 
                    backMat, // คว่ำหน้าโชว์ลายเวทมนตร์ตอนแรก
                    frontMat  // หงายรูปนักเรียนตอนสแกนเจอ
                ];

                const cardMesh = new THREE.Mesh(cardGeo, materials);
                cardMesh.position.set(0, 0, 0);
                cardPivot.add(cardMesh);

                // พิกัดวงรีและองศาเอียงเฉียงสโลปซ้อนทับกันแบบมิติ Cinematic
                cardPivot.position.x = Math.cos(angle) * radiusX;
                cardPivot.position.y = Math.sin(angle) * radiusY;
                cardPivot.position.z = -Math.abs(Math.sin(angle)) * 0.5; // ให้ไพ่ด้านหลังดูลึกถอยห่างออกไป
                
                cardPivot.rotation.z = angle - Math.PI / 2;
                cardPivot.rotation.y = 0; 

                cardPivot.userData = {
                    index: index,
                    studentId: student.id,
                    origX: cardPivot.position.x,
                    origY: cardPivot.position.y,
                    origZ: cardPivot.position.z,
                    origRz: cardPivot.rotation.z,
                    isChosen: false
                };

                cardsGroup.add(cardPivot);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if(starField) {
                starField.rotation.y += 0.0003;
            }

            if (!activeCard) {
                cardsGroup.rotation.z -= 0.001; // วงหมุนตามเข็มนาฬิกาเอื่อยๆ ดูลึกลับ
            }

            raycaster.setFromCamera(hand2D, camera);
            const intersects = raycaster.intersectObjects(cardsGroup.children, true);

            if (intersects.length > 0) {
                let hitMesh = intersects[0].object;
                let collidedCard = hitMesh.parent;

                let target3D = new THREE.Vector3();
                raycaster.ray.at(6.8, target3D);
                pointerSphere.position.copy(target3D);

                if (activeCard !== collidedCard) {
                    if (activeCard) resetCard(activeCard);
                    activeCard = collidedCard;
                    selectCard(activeCard);
                }
            } else {
                if (activeCard) {
                    resetCard(activeCard);
                    activeCard = null;
                }
                pointerSphere.position.set(-999,-999,-999);
            }

            renderer.render(scene, camera);
        }

        function selectCard(card) {
            card.userData.isChosen = true;
            document.getElementById('status-text').innerText = `🔮 運命のカード：生徒番号 ${card.userData.studentId} 番 (ไพ่ลิขิตนักเรียนคนที่ ${card.userData.studentId}) 🔮`;
            document.getElementById('status-text').style.color = "#ffd700";

            // บินพุ่งมาตรงกลางวง ขยายหน้าตัก และพลิกหงาย 180 องศาเพื่อส่องรูปนักเรียนฉลุยชัดเจน
            gsap.to(card.position, { x: 0, y: 1.0, z: 4.5, duration: 0.5, ease: "power2.out" });
            gsap.to(card.rotation, { x: 0, y: Math.PI, z: 0, duration: 0.5, ease: "power2.out" });
        }

        function resetCard(card) {
            card.userData.isChosen = false;
            document.getElementById('status-text').innerText = "🖐 人差し指をかざして、運命の一枚を選んでください (ชูนิ้วชี้เพื่อเลือกไพ่ดวงใจ)";
            document.getElementById('status-text').style.color = "#a78bfa";

            gsap.to(card.position, { x: card.userData.origX, y: card.userData.origY, z: card.userData.origZ, duration: 0.5, ease: "power2.inOut" });
            gsap.to(card.rotation, { x: 0, y: 0, z: card.userData.origRz, duration: 0.5, ease: "power2.inOut" });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ----------------- อัปเกรดระบบกล้องเชื่อมต่อ Browser เสถียรสูง -----------------
        const videoElement = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // พิกัดข้อต่อปลายนิ้วชี้เบอร์ 8
                const indexTip = results.multiHandLandmarks[0][8];
                hand2D.x = -(indexTip.x * 2 - 1); 
                hand2D.y = -(indexTip.y * 2 - 1) + 0.3; // ชดเชยระยะเยื้องนิ้วให้ชี้สนุกขึ้น
            } else {
                hand2D.set(-999, -999);
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.45, // ปรับลดเล็กน้อยเพื่อให้จับนิ้วไวขึ้น ไม่หลุดง่าย
            minTrackingConfidence: 0.45
        });
        hands.onResults(onResults);

        // ดึงสิทธิ์กล้องแบบ Native WebRTC Stream (แก้ปัญหากล้องค้าง ล็อก ถ่ายไม่ติด)
        async function setupWebcam() {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: 640, height: 480, facingMode: "user" }
                    });
                    videoElement.srcObject = stream;
                    
                    // รันเฟรมวิดีโอส่งเข้าสมองกล AI แฮนด์แทร็กกิ้ง
                    async function detectionLoop() {
                        if (videoElement.readyState >= 3) {
                            await hands.send({ image: videoElement });
                        }
                        requestAnimationFrame(detectionLoop);
                    }
                    detectionLoop();
                    statusText.innerText = "🖐 人差し指をかざして、運命の一枚を選んでください (ชูนิ้วชี้เพื่อเลือกไพ่ดวงใจ)";
                } catch (error) {
                    statusText.innerText = "⚠️ กล้องถูกบล็อกสิทธิ์หรือถูกโปรแกรมอื่นดึงไปใช้งานอยู่";
                    console.error(error);
                }
            } else {
                statusText.innerText = "⚠️ เบราว์เซอร์นี้ไม่รองรับระบบกล้อง";
            }
        }

        init3D();
        animate();
        setupWebcam();
    </script>
</body>
</html>
