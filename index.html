<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>🔮 AI Tarot Oracle</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+JP:wght@700&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    overflow:hidden;
    background:
    radial-gradient(circle at top,#1a0033,#030010 60%);
    font-family:'Noto Serif JP',serif;
}

#canvas-container{
    position:fixed;
    inset:0;
}

.ui{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:20;
    padding:20px;
    pointer-events:none;
}

.title{
    text-align:center;
    margin-top:10px;
}

h1{
    margin:0;
    font-size:clamp(2rem,5vw,4rem);
    letter-spacing:6px;

    background:linear-gradient(
        to bottom,
        #fff,
        #ffd700,
        #ff9d00
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 30px rgba(255,215,0,0.4);
}

.subtitle{
    color:#e9d5ff;
    margin-top:10px;
    font-size:clamp(.9rem,2vw,1.1rem);
}

#status{
    margin-top:18px;
    color:#fff;
    font-size:1rem;
}

.webcam-box{
    position:fixed;
    right:18px;
    bottom:18px;
    width:180px;
    height:135px;
    border-radius:16px;
    overflow:hidden;

    border:2px solid rgba(255,255,255,.2);

    box-shadow:
    0 0 20px rgba(0,0,0,.8),
    0 0 30px rgba(168,85,247,.4);

    z-index:30;

    backdrop-filter:blur(10px);
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
}

.gesture-box{
    position:fixed;
    left:20px;
    bottom:20px;
    z-index:30;

    background:rgba(0,0,0,.4);

    border:1px solid rgba(255,255,255,.1);

    padding:16px 20px;
    border-radius:18px;

    color:white;

    backdrop-filter:blur(10px);
}

.gesture{
    margin:6px 0;
    opacity:.8;
}

.magic-flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(circle,#ffffff66,transparent 60%);
    opacity:0;
    z-index:50;
}

</style>
</head>

<body>

<div id="canvas-container"></div>

<div class="ui">
    <div class="title">
        <h1>🔮 今日の一枚 🔮</h1>

        <div class="subtitle">
            👆 ชี้ไพ่ • ✊ กำมือหยิบ • 👉 ปัดเพื่อคืนไพ่
        </div>

        <div id="status">
            🌌 กำลังเปิดประตูแห่งไพ่...
        </div>
    </div>
</div>

<div class="gesture-box">
    <div class="gesture">👆 ชี้ = เลือกไพ่</div>
    <div class="gesture">✊ กำมือ = หยิบไพ่</div>
    <div class="gesture">👉 ปัด = ส่งไพ่กลับ</div>
</div>

<div class="webcam-box">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div class="magic-flash" id="flash"></div>

<script>

let scene,camera,renderer;
let raycaster;
let starField;

const cards=[];

const totalCards=55;
const uniqueStudents=25;

let hoveredCard=null;
let selectedCard=null;
let revealedCard=null;

let hand2D=new THREE.Vector2(-999,-999);

let pointerSphere;

let lastIndexX=0;
let swipeVelocity=0;

let gesture="NONE";

const statusEl=document.getElementById("status");

const flash=document.getElementById("flash");


// ------------------ SOUND ------------------

const cardSound=new Audio("sounds/card.mp3");
const magicSound=new Audio("sounds/magic.mp3");

cardSound.volume=.5;
magicSound.volume=.6;

function playCardSound(){
    cardSound.currentTime=0;
    cardSound.play();
}

function playMagic(){
    magicSound.currentTime=0;
    magicSound.play();
}


// ------------------ INIT ------------------

function init(){

    scene=new THREE.Scene();

    scene.fog=new THREE.FogExp2(0x050010,.03);

    camera=new THREE.PerspectiveCamera(
        50,
        window.innerWidth/window.innerHeight,
        .1,
        1000
    );

    camera.position.set(0,-.5,9);

    renderer=new THREE.WebGLRenderer({
        antialias:true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    renderer.setPixelRatio(
        Math.min(window.devicePixelRatio,2)
    );

    renderer.outputEncoding=THREE.sRGBEncoding;

    document
    .getElementById("canvas-container")
    .appendChild(renderer.domElement);

    raycaster=new THREE.Raycaster();

    createLights();
    createStars();
    createCards();
    createPointer();

    animate();

    window.addEventListener("resize",onResize);

}

function createLights(){

    scene.add(
        new THREE.AmbientLight(0x8844ff,2)
    );

    const light=new THREE.PointLight(
        0xffcc88,
        2,
        30
    );

    light.position.set(0,5,5);

    scene.add(light);

}

function createStars(){

    const geo=new THREE.BufferGeometry();

    const count=2500;

    const pos=new Float32Array(count*3);

    for(let i=0;i<count*3;i+=3){

        pos[i]=(Math.random()-.5)*80;
        pos[i+1]=(Math.random()-.5)*80;
        pos[i+2]=(Math.random()-.5)*80;

    }

    geo.setAttribute(
        "position",
        new THREE.BufferAttribute(pos,3)
    );

    const mat=new THREE.PointsMaterial({
        color:0xffffff,
        size:.08,
        transparent:true,
        opacity:.8
    });

    starField=new THREE.Points(geo,mat);

    scene.add(starField);

}

function createPointer(){

    const geo=new THREE.SphereGeometry(.08,32,32);

    const mat=new THREE.MeshBasicMaterial({
        color:0x00ffee
    });

    pointerSphere=new THREE.Mesh(geo,mat);

    scene.add(pointerSphere);

}

function createCards(){

    const loader=new THREE.TextureLoader();

    const backCanvas=document.createElement("canvas");

    backCanvas.width=256;
    backCanvas.height=384;

    const ctx=backCanvas.getContext("2d");

    ctx.fillStyle="#1a0030";
    ctx.fillRect(0,0,256,384);

    ctx.strokeStyle="#ffd700";
    ctx.lineWidth=8;
    ctx.strokeRect(14,14,228,356);

    ctx.font="50px serif";
    ctx.fillStyle="#ffd700";
    ctx.fillText("☾",105,200);

    const backTex=new THREE.CanvasTexture(backCanvas);

    for(let i=0;i<totalCards;i++){

        const id=(i%uniqueStudents)+1;

        const geo=new THREE.BoxGeometry(
            .85,
            1.35,
            .03
        );

        const frontMat=new THREE.MeshStandardMaterial({
            roughness:.25
        });

        loader.load(

            `images/${id}.png`,

            (tex)=>{

                tex.encoding=THREE.sRGBEncoding;

                frontMat.map=tex;
                frontMat.needsUpdate=true;

            }

        );

        const backMat=new THREE.MeshStandardMaterial({
            map:backTex
        });

        const materials=[
            backMat,
            backMat,
            backMat,
            backMat,
            backMat,
            frontMat
        ];

        const card=new THREE.Mesh(
            geo,
            materials
        );

        const angle=(i/totalCards)*Math.PI*2;

        const radiusX=5;
        const radiusY=3.2;

        const x=Math.cos(angle)*radiusX;
        const y=Math.sin(angle)*radiusY-1;
        const z=-Math.abs(Math.cos(angle));

        card.position.set(x,y,z);

        card.rotation.z=angle-Math.PI/2;
        card.rotation.x=.3;

        card.userData={
            id,
            ox:x,
            oy:y,
            oz:z,
            rx:card.rotation.x,
            rz:card.rotation.z
        };

        cards.push(card);

        scene.add(card);

    }

}


// ------------------ ANIMATION ------------------

function animate(){

    requestAnimationFrame(animate);

    const t=Date.now()*.001;

    starField.rotation.y+=.0005;

    starField.material.opacity=
    .5+Math.sin(t*2)*.3;

    raycaster.setFromCamera(
        hand2D,
        camera
    );

    if(selectedCard){

        let pos=new THREE.Vector3();

        raycaster.ray.at(6,pos);

        selectedCard.position.lerp(pos,.15);

        selectedCard.rotation.set(0,0,0);

    }else{

        const hit=raycaster.intersectObjects(cards);

        if(hit.length){

            const card=hit[0].object;

            if(hoveredCard!==card){

                resetHover();

                hoveredCard=card;

                gsap.to(card.position,{
                    z:1,
                    duration:.2
                });

            }

        }else{

            resetHover();

        }

    }

    let pointerPos=new THREE.Vector3();

    raycaster.ray.at(6,pointerPos);

    pointerSphere.position.copy(pointerPos);

    renderer.render(scene,camera);

}

function resetHover(){

    if(hoveredCard && hoveredCard!==selectedCard){

        gsap.to(
            hoveredCard.position,
            {
                x:hoveredCard.userData.ox,
                y:hoveredCard.userData.oy,
                z:hoveredCard.userData.oz,
                duration:.3
            }
        );

    }

    hoveredCard=null;

}


// ------------------ REVEAL ------------------

function revealCard(card){

    if(revealedCard && revealedCard!==card){

        sendBack(revealedCard);

    }

    revealedCard=card;

    playCardSound();
    playMagic();

    gsap.to(flash,{
        opacity:1,
        duration:.15,
        yoyo:true,
        repeat:1
    });

    gsap.to(card.position,{
        x:0,
        y:.4,
        z:4.8,
        duration:.5
    });

    gsap.to(card.rotation,{
        x:0,
        y:0,
        z:0,
        duration:.5
    });

    statusEl.innerHTML=
    `✨ ไพ่หมายเลข ${card.userData.id} ✨`;

}

function sendBack(card){

    gsap.to(card.position,{
        x:card.userData.ox,
        y:card.userData.oy,
        z:card.userData.oz,
        duration:.5
    });

    gsap.to(card.rotation,{
        x:card.userData.rx,
        y:0,
        z:card.userData.rz,
        duration:.5
    });

    revealedCard=null;

}


// ------------------ GESTURE ------------------

const video=document.getElementById("webcam");

const hands=new Hands({
    locateFile:(file)=>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:.7,
    minTrackingConfidence:.7
});

hands.onResults(onResults);

function distance(a,b){

    return Math.sqrt(
        Math.pow(a.x-b.x,2)+
        Math.pow(a.y-b.y,2)
    );

}

function onResults(results){

    if(
        !results.multiHandLandmarks ||
        results.multiHandLandmarks.length===0
    ){
        return;
    }

    const hand=results.multiHandLandmarks[0];

    const thumb=hand[4];
    const index=hand[8];
    const middle=hand[12];
    const palm=hand[0];

    hand2D.x=-(index.x*2-1);
    hand2D.y=-(index.y*2-1);

    const pinch=distance(
        thumb,
        index
    );

    const fist=
        distance(index,palm)<.15 &&
        distance(middle,palm)<.15;

    swipeVelocity=index.x-lastIndexX;

    lastIndexX=index.x;

    // 👆 POINT
    if(!fist && pinch>.08){

        gesture="POINT";

        statusEl.innerHTML=
        "👆 ชี้ไพ่เพื่อเลือก";

    }

    // ✊ FIST
    if(fist){

        gesture="FIST";

        statusEl.innerHTML=
        "✊ กำลังจับไพ่";

        if(
            hoveredCard &&
            !selectedCard
        ){

            selectedCard=hoveredCard;

        }

    }else{

        if(selectedCard){

            revealCard(selectedCard);

            selectedCard=null;

        }

    }

    // 👉 SWIPE
    if(Math.abs(swipeVelocity)>.03){

        gesture="SWIPE";

        statusEl.innerHTML=
        "👉 ปัดเพื่อคืนไพ่";

        if(revealedCard){

            sendBack(revealedCard);

        }

    }

}


// ------------------ CAMERA ------------------

async function setupCamera(){

    try{

        const stream=
        await navigator.mediaDevices.getUserMedia({
            video:true
        });

        video.srcObject=stream;

        async function detect(){

            await hands.send({
                image:video
            });

            requestAnimationFrame(detect);

        }

        detect();

    }catch(e){

        statusEl.innerHTML=
        "🖱️ webcam denied";

    }

}


// ------------------ RESIZE ------------------

function onResize(){

    camera.aspect=
    window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

}


// ------------------ START ------------------

init();
setupCamera();

</script>

</body>
</html>
